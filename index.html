<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Cario Adventure Run</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f0f0f0;\n        }\n        #gameCanvas {\n            border: 2px solid #000;\n            background-color: #fff;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="gameCanvas" width="800" height="600"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const context = canvas.getContext('2d');\n        let player = { x: 50, y: 50, width: 50, height: 50, color: 'blue' };\n        let obstacles = [];\n        let isGameOver = false;\n        function drawPlayer() {\n            context.fillStyle = player.color;\n            context.fillRect(player.x, player.y, player.width, player.height);\n        }\n        function createObstacle() {\n            const obstacle = { x: canvas.width, y: Math.random() * (canvas.height - 20), width: 20, height: 20 };\n            obstacles.push(obstacle);\n        }\n        function drawObstacles() {\n            obstacles.forEach(obstacle => {\n                context.fillStyle = 'red';\n                context.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);\n                obstacle.x -= 5;\n            });\n            obstacles = obstacles.filter(obstacle => obstacle.x + obstacle.width > 0);\n        }\n        function checkCollision() {\n            obstacles.forEach(obstacle => {\n                if (player.x < obstacle.x + obstacle.width &&\n                    player.x + player.width > obstacle.x &&\n                    player.y < obstacle.y + obstacle.height &&\n                    player.y + player.height > obstacle.y) {\n                    isGameOver = true;\n                }\n            });\n        }\n        function gameLoop() {\n            if (isGameOver) {\n                context.fillStyle = 'black';\n                context.font = '30px Arial';\n                context.fillText('Game Over!', canvas.width / 2 - 70, canvas.height / 2);\n                return;\n            }\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            drawPlayer();\n            drawObstacles();\n            checkCollision();\n        }\n        document.addEventListener('keydown', event => {\n            if (event.key === 'ArrowUp') player.y -= 10;\n            if (event.key === 'ArrowDown') player.y += 10;\n            if (player.y < 0) player.y = 0;\n            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;\n        });\n        setInterval(createObstacle, 1500);\n        setInterval(gameLoop, 1000 / 60);\n    </script>\n</body>\n</html>
